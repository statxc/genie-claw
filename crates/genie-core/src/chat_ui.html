<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GeniePod</title>
<style>
:root {
  --bg: #0a0e14; --surface: #131920; --border: #1e2730;
  --text: #e0e6ed; --text2: #8899aa; --accent: #00d4ff;
  --green: #00e676; --amber: #ffab40; --red: #ff5252; --user-bg: #1a2332; --bot-bg: #0f1820;
  --tool-bg: #1a1a2e; --tool-border: #7c4dff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; display: flex; flex-direction: column;
}

header {
  padding: .75rem 1rem; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
header h1 {
  font-size: 1rem; font-weight: 600;
  background: linear-gradient(135deg, var(--accent), #7c4dff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
header .status {
  font-size: .75rem; color: var(--text2);
  display: flex; align-items: center; gap: .5rem;
}
header .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green); display: inline-block;
}
header .dot.degraded { background: var(--amber); }
header .dot.offline { background: var(--red); }
header button {
  background: none; border: 1px solid var(--border); color: var(--text2);
  padding: .3rem .7rem; border-radius: 4px; cursor: pointer; font-size: .75rem;
}
header button:hover { border-color: var(--accent); color: var(--accent); }

.messages {
  flex: 1; overflow-y: auto; padding: 1rem;
  display: flex; flex-direction: column; gap: .75rem;
}

.msg {
  max-width: 80%; padding: .75rem 1rem; border-radius: 12px;
  font-size: .9rem; line-height: 1.5; word-wrap: break-word;
}
.msg.user {
  align-self: flex-end; background: var(--user-bg);
  border-bottom-right-radius: 4px;
}
.msg.bot {
  align-self: flex-start; background: var(--bot-bg);
  border: 1px solid var(--border); border-bottom-left-radius: 4px;
}
.msg.bot.streaming {
  color: var(--text2);
  display: flex; align-items: center; gap: .5rem;
}
.writing-dots {
  display: inline-flex; align-items: center; gap: 4px;
}
.writing-dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); opacity: .35;
  animation: writing-pulse 1.2s infinite ease-in-out;
}
.writing-dots span:nth-child(2) { animation-delay: .16s; }
.writing-dots span:nth-child(3) { animation-delay: .32s; }
@keyframes writing-pulse {
  0%, 80%, 100% { opacity: .35; transform: translateY(0); }
  40% { opacity: 1; transform: translateY(-5px); }
}
@media (prefers-reduced-motion: reduce) {
  .writing-dots span { animation: none; opacity: .75; }
}
.msg.tool {
  align-self: flex-start; background: var(--tool-bg);
  border: 1px solid var(--tool-border); border-radius: 8px;
  font-size: .8rem; font-family: 'SF Mono', 'Fira Code', monospace;
}
.msg .label {
  font-size: .7rem; color: var(--text2); margin-bottom: .25rem;
  text-transform: uppercase; letter-spacing: .06em;
}
.msg .tool-name {
  color: var(--tool-border); font-weight: 600;
}
.msg.system {
  align-self: center; color: var(--text2); font-size: .8rem;
  font-style: italic;
}

.thinking {
  align-self: flex-start; color: var(--text2); font-size: .85rem;
  display: flex; align-items: center; gap: .5rem; padding: .5rem 0;
}
.thinking .dots span {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); animation: bounce 1.4s infinite;
  margin: 0 2px;
}
.thinking .dots span:nth-child(2) { animation-delay: .2s; }
.thinking .dots span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); }
  40% { transform: translateY(-8px); }
}

.input-bar {
  padding: .75rem 1rem; background: var(--surface); border-top: 1px solid var(--border);
  display: flex; gap: .5rem; flex-shrink: 0;
}
.input-bar input {
  flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text);
  padding: .6rem .9rem; border-radius: 8px; font-size: .9rem; outline: none;
}
.input-bar input:focus { border-color: var(--accent); }
.input-bar input::placeholder { color: var(--text2); }
.input-bar button {
  background: var(--accent); color: var(--bg); border: none;
  padding: .6rem 1.2rem; border-radius: 8px; font-size: .9rem;
  font-weight: 600; cursor: pointer;
}
.input-bar button:hover { opacity: .9; }
.input-bar button:disabled { opacity: .4; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <h1>GeniePod</h1>
  <div class="status">
    <span class="dot" id="status-dot"></span>
    <span id="status-text">Connecting...</span>
    <button onclick="clearChat()">Clear</button>
  </div>
</header>

<div class="messages" id="messages">
  <div class="msg system">Type a message to talk to GeniePod.</div>
</div>

<div class="input-bar">
  <input type="text" id="input" placeholder="Ask GeniePod anything..."
         autofocus autocomplete="off"
         onkeydown="if(event.key==='Enter')sendMessage()">
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');

let sending = false;

function applyHealthStatus(data) {
  if (data.status === 'ok' && data.llm === 'connected') {
    statusDot.className = 'dot';
    statusText.textContent = 'Connected';
    return;
  }
  statusDot.className = 'dot degraded';
  statusText.textContent = data.llm === 'offline' ? 'LLM offline' : 'Degraded';
}

async function checkHealth() {
  try {
    const r = await fetch('/api/health');
    if (!r.ok) throw new Error('health unavailable');
    const data = await r.json();
    applyHealthStatus(data);
  } catch {
    statusDot.className = 'dot offline';
    statusText.textContent = 'Offline';
  }
}

function addMessage(role, content, toolName) {
  const div = document.createElement('div');

  if (toolName) {
    div.className = 'msg tool';
    div.innerHTML = `<div class="label">Tool: <span class="tool-name">${esc(toolName)}</span></div>${esc(content)}`;
  } else if (role === 'user') {
    div.className = 'msg user';
    div.textContent = content;
  } else if (role === 'system') {
    div.className = 'msg system';
    div.textContent = content;
  } else {
    div.className = 'msg bot';
    div.textContent = content;
  }

  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function addStreamingMessage() {
  const div = document.createElement('div');
  div.className = 'msg bot streaming';
  div.setAttribute('aria-busy', 'true');
  div.setAttribute('aria-live', 'polite');
  div.innerHTML = [
    '<span class="writing-label">Agent writing</span>',
    '<span class="writing-dots" aria-hidden="true"><span></span><span></span><span></span></span>'
  ].join('');
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function setMessageText(div, content) {
  div.className = 'msg bot';
  div.removeAttribute('aria-busy');
  div.textContent = content;
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function setMessageTool(div, toolName, content) {
  div.className = 'msg tool';
  div.removeAttribute('aria-busy');
  div.innerHTML = `<div class="label">Tool: <span class="tool-name">${esc(toolName)}</span></div>${esc(content)}`;
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || sending) return;

  sending = true;
  sendBtn.disabled = true;
  inputEl.value = '';

  addMessage('user', text);
  const replyEl = addStreamingMessage();

  try {
    const r = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Genie-Origin': 'dashboard' },
      body: JSON.stringify({ message: text }),
    });

    if (!r.ok) {
      const err = await r.text();
      replyEl.remove();
      addMessage('system', 'Error: ' + err);
      return;
    }

    if (!r.body) {
      const fallback = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Genie-Origin': 'dashboard' },
        body: JSON.stringify({ message: text }),
      });
      const data = await fallback.json();
      if (data.tool) {
        setMessageTool(replyEl, data.tool, data.response);
      } else {
        setMessageText(replyEl, data.response);
      }
      return;
    }

    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let rendered = '';
    let finalTool = null;

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) continue;

        let event;
        try {
          event = JSON.parse(trimmed);
        } catch {
          continue;
        }

        if (event.type === 'token') {
          rendered += event.content || '';
          setMessageText(replyEl, rendered);
        } else if (event.type === 'replace') {
          rendered = event.content || '';
          finalTool = event.tool || null;
          if (finalTool) {
            setMessageTool(replyEl, finalTool, rendered);
          } else {
            setMessageText(replyEl, rendered);
          }
        } else if (event.type === 'done') {
          rendered = event.response || rendered;
          finalTool = event.tool || finalTool;
          if (finalTool) {
            setMessageTool(replyEl, finalTool, rendered);
          } else {
            setMessageText(replyEl, rendered);
          }
        } else if (event.type === 'error') {
          throw new Error(event.message || 'stream failed');
        }
      }
    }

    if (buffer.trim()) {
      const event = JSON.parse(buffer.trim());
      if (event.type === 'done') {
        rendered = event.response || rendered;
        finalTool = event.tool || finalTool;
        if (finalTool) {
          setMessageTool(replyEl, finalTool, rendered);
        } else {
          setMessageText(replyEl, rendered);
        }
      }
    }
  } catch (e) {
    replyEl.remove();
    addMessage('system', 'Connection error: ' + e.message);
  } finally {
    sending = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

async function clearChat() {
  try {
    await fetch('/api/chat/clear', { method: 'POST' });
    messagesEl.innerHTML = '';
    addMessage('system', 'Conversation cleared.');
  } catch (e) {
    addMessage('system', 'Failed to clear: ' + e.message);
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Init
checkHealth();
setInterval(checkHealth, 10000);
inputEl.focus();
</script>
</body>
</html>
